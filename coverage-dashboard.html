<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Coverage Dashboard</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0b1120;
        --panel: #111827;
        --panel-border: #334155;
        --text: #e5e7eb;
        --muted: #94a3b8;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "SF Pro Display", "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at top left, rgba(59, 130, 246, 0.2), transparent 30%),
          radial-gradient(circle at top right, rgba(16, 185, 129, 0.18), transparent 24%),
          var(--bg);
        color: var(--text);
      }

      main {
        display: grid;
        grid-template-rows: auto 1fr;
        min-height: 100vh;
        padding: 24px;
        gap: 20px;
      }

      header h1 {
        margin: 0 0 6px;
        font-size: clamp(1.5rem, 2vw, 2.2rem);
        letter-spacing: 0.02em;
      }

      header p {
        margin: 0;
        color: var(--muted);
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 20px;
        min-height: 0;
      }

      .panel {
        display: grid;
        grid-template-rows: auto 1fr;
        min-height: 0;
        background: rgba(17, 24, 39, 0.82);
        border: 1px solid rgba(51, 65, 85, 0.8);
        border-radius: 18px;
        overflow: hidden;
        backdrop-filter: blur(14px);
        box-shadow: 0 20px 50px rgba(15, 23, 42, 0.35);
      }

      .panel-header {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 12px;
        padding: 16px 18px;
        border-bottom: 1px solid rgba(51, 65, 85, 0.75);
      }

      .panel-header h2 {
        margin: 0;
        font-size: 1rem;
      }

      .panel-header span {
        color: var(--muted);
        font-size: 0.875rem;
      }

      iframe {
        width: 100%;
        height: 100%;
        border: 0;
        background: #0f172a;
        filter: invert(0.92) hue-rotate(180deg) saturate(0.82) contrast(0.95);
      }

      @media (max-width: 980px) {
        .grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <h1>Coverage Dashboard</h1>
        <p>Run <code>npm run coverage</code> and open this file to compare Jest and Vitest HTML coverage reports.</p>
      </header>

      <section class="grid">
        <article class="panel">
          <div class="panel-header">
            <h2>Jest Coverage</h2>
            <span>coverage/jest/index.html</span>
          </div>
          <iframe src="./coverage/jest/index.html" title="Jest coverage report"></iframe>
        </article>

        <article class="panel">
          <div class="panel-header">
            <h2>Vitest Coverage</h2>
            <span>coverage/vitest/index.html</span>
          </div>
          <iframe src="./coverage/vitest/index.html" title="Vitest coverage report"></iframe>
        </article>
      </section>
    </main>
  </body>
</html>
